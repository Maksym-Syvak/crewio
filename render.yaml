databases:
  - name: crewio-db
    databaseName: restaurant_shifts
    user: crewio
    plan: free
    region: frankfurt

services:
  - type: web
    name: crewio-api
    runtime: node
    region: frankfurt
    plan: free
    rootDir: restaurant-shifts-backend
    buildCommand: npm install --include=dev && npm run build && npm prune --omit=dev
    startCommand: node dist/main
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_SYNCHRONIZE
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: crewio-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 900
      - key: JWT_REFRESH_EXPIRES_DAYS
        value: "30"
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: PORT
        value: 10000
